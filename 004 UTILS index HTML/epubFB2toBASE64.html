<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EPUB / FB2 to Base64 Converter</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      padding: 20px;
    }

    .container {
      max-width: 700px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 26px;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      margin-bottom: 20px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    #drop-zone {
      border: 3px dashed #bbb;
      border-radius: 12px;
      padding: 50px 20px;
      text-align: center;
      background: #fafafa;
      transition: 0.2s;
      cursor: pointer;
      font-size: 18px;
    }

    #drop-zone.hover {
      border-color: #333;
      background: #eee;
    }

    #status {
      margin-top: 20px;
      font-weight: bold;
      font-size: 16px;
    }

    button {
      margin-top: 20px;
      padding: 12px 22px;
      border: none;
      border-radius: 8px;
      background: #222;
      color: white;
      font-size: 16px;
      cursor: pointer;
      display: none;
    }

    button:hover {
      opacity: 0.9;
    }

    textarea {
      width: 100%;
      height: 220px;
      margin-top: 20px;
      font-family: monospace;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      resize: vertical;
    }

    .info {
      margin-top: 15px;
      color: #666;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>EPUB / FB2 → Base64</h1>

    <div>
      1) Введите название переменной:
      <input id="var-name" type="text" value="bookData" />
    </div>

    <div id="drop-zone">
      2) Перетащите сюда EPUB или FB2 файл<br><br>
      или кликните для выбора
    </div>

    <input type="file" id="file-input" accept=".epub,.fb2" hidden />

    <div class="info">
      Поддерживаются файлы: .epub и .fb2
    </div>

    <div id="status"></div>

    <button id="download-btn">
      3) Скачать .js файл
    </button>

    <textarea id="result"></textarea>
  </div>

  <script>
    const dropZone = document.getElementById("drop-zone");
    const fileInput = document.getElementById("file-input");
    const status = document.getElementById("status");
    const downloadBtn = document.getElementById("download-btn");
    const result = document.getElementById("result");
    const varNameInput = document.getElementById("var-name");

    let generatedContent = "";

    // drag over
    dropZone.addEventListener("dragover", (e) => {
      e.preventDefault();
      dropZone.classList.add("hover");
    });

    // drag leave
    dropZone.addEventListener("dragleave", (e) => {
      e.preventDefault();
      dropZone.classList.remove("hover");
    });

    // drop
    dropZone.addEventListener("drop", (e) => {
      e.preventDefault();
      dropZone.classList.remove("hover");

      const file = e.dataTransfer.files[0];
      processFile(file);
    });

    // click select
    dropZone.addEventListener("click", () => {
      fileInput.click();
    });

    fileInput.addEventListener("change", (e) => {
      const file = e.target.files[0];
      processFile(file);
    });

    function processFile(file) {
      if (!file) return;

      const ext = file.name.split('.').pop().toLowerCase();

      if (!["epub", "fb2"].includes(ext)) {
        status.textContent = "Ошибка: загрузите EPUB или FB2 файл.";
        return;
      }

      status.textContent = "Конвертация...";

      const reader = new FileReader();

      reader.onload = function(event) {
        const base64 = event.target.result.split(",")[1];

        let mime = "application/octet-stream";

        if (ext === "epub") {
          mime = "application/epub+zip";
        }

        if (ext === "fb2") {
          mime = "application/xml";
        }

        const variableName = sanitizeVariableName(varNameInput.value || "bookData");

        generatedContent =
`const ${variableName} = "data:${mime};base64,${base64}";`;

        result.value = generatedContent;

        status.textContent = "Файл успешно конвертирован в Base64!";
        downloadBtn.style.display = "inline-block";
      };

      reader.readAsDataURL(file);
    }

    function sanitizeVariableName(name) {
      return name
        .replace(/[^a-zA-Z0-9_$]/g, "_")
        .replace(/^[0-9]/, "_$&");
    }

    function download(filename, text) {
      const element = document.createElement("a");

      element.setAttribute(
        "href",
        "data:text/plain;charset=utf-8," + encodeURIComponent(text)
      );

      element.setAttribute("download", filename);

      element.style.display = "none";

      document.body.appendChild(element);

      element.click();

      document.body.removeChild(element);
    }

    downloadBtn.addEventListener("click", () => {
      const filename = `${varNameInput.value || "bookData"}.js`;
      download(filename, generatedContent);
    });
  </script>

</body>
</html>
